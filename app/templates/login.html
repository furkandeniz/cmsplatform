<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Giriş Yap · CMSPlus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
          colors: {
            brand: {
              50: "#eef2ff", 100: "#e0e7ff", 200: "#c7d2fe", 400: "#818cf8",
              500: "#6366f1", 600: "#4f46e5", 700: "#4338ca",
            },
          },
        },
      },
    };
  </script>
</head>
<body class="font-sans bg-slate-50 text-slate-900 min-h-screen antialiased flex items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-2.5 mb-8">
      <span class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-bold text-sm shadow-sm">C+</span>
      <span class="text-xl font-bold tracking-tight">CMSPlus</span>
    </div>
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <h1 class="text-lg font-semibold text-slate-900 mb-1">Giriş Yap</h1>
      <p class="text-sm text-slate-500 mb-5">Devam etmek için e-posta ve şifreni gir.</p>

      {% if error %}
      <p class="text-sm text-red-700 bg-red-50 rounded-lg px-3 py-2 mb-4">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <input type="hidden" name="next" value="{{ next or '/' }}" />
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">E-posta</label>
          <input type="email" id="email" name="email" required autofocus autocomplete="username"
                 class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Şifre</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
                 class="w-full rounded-lg border border-slate-300 px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition" />
        </div>
        <button type="submit"
                class="w-full bg-brand-600 text-white text-sm font-medium px-4 py-2.5 rounded-lg shadow-sm hover:bg-brand-700 hover:shadow transition">
          Giriş Yap
        </button>
      </form>
    </div>
  </div>
</body>
</html>
