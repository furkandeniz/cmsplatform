<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CMSPlus{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
          colors: {
            brand: {
              50: "#eef2ff", 100: "#e0e7ff", 200: "#c7d2fe", 400: "#818cf8",
              500: "#6366f1", 600: "#4f46e5", 700: "#4338ca",
            },
          },
        },
      },
    };
  </script>
  <style>
    dialog::backdrop { background: rgba(15, 23, 42, 0.45); }
  </style>
</head>
<body class="font-sans bg-slate-50 text-slate-900 min-h-screen antialiased">
  <nav class="bg-white/80 backdrop-blur border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="flex items-center gap-2.5">
          <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-bold text-sm shadow-sm">C+</span>
          <span class="text-lg font-bold tracking-tight">CMSPlus</span>
        </a>
        <a href="/health-checks" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition">Sağlık Kontrolleri</a>
        <a href="/seo-checks" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition">SEO Kontrolleri</a>
        <a href="/lighthouse-checks" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition">Lighthouse</a>
      </div>
      <span class="text-sm text-slate-400 hidden sm:block">Drupal Proje Yönetim Platformu</span>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
